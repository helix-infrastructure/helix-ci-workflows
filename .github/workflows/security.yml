name: Security

on:
  workflow_call:
    inputs:
      scan_type:
        description: "terraform | app | container | all"
        type: string
        default: "all"
      working_directory:
        type: string
        default: "."
      image_ref:
        description: "Image ref to scan with trivy (required if scan_type includes container)"
        type: string
        default: ""

jobs:
  security:
    name: security
    runs-on: ubuntu-latest
    # gitleaks-action posts PR comments/check annotations, which needs
    # pull-requests: write — the caller's job must grant at least this much
    # (a reusable workflow's permissions can only be narrowed by the caller,
    # never widened beyond what the caller itself has).
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      # fetch-depth: 0 — gitleaks scans full git history, not just the working
      # tree; the default shallow clone makes its git-log scan fail outright.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Runs unconditionally regardless of scan_type — secret scanning is a hard
      # rule (standards/security.md), never optional.
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Hard gate at HIGH+ only, matching check-security's own severity tiers
      # (Critical/High block merge; Medium/Low/Informational don't). Without
      # this, any LOW finding — e.g. "use a customer-managed KMS key" on an
      # already-AES256-encrypted resource, which already satisfies
      # security.md's actual "encrypted at rest" requirement — blocks merge.
      - name: tfsec
        if: contains(fromJson('["terraform","all"]'), inputs.scan_type)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ inputs.working_directory }}
          additional_args: --minimum-severity HIGH

      # soft_fail: checkov has no severity-filter input (unlike tfsec) and is
      # far noisier by default — hard-failing on it would mean fixing every
      # built-in checkov suggestion just to get CI green, not just real
      # security.md violations. Findings stay visible, don't block merge.
      # Tighten via hard_fail_on for specific check IDs once the org decides
      # which checkov rules are actually mandatory.
      - name: Checkov
        if: contains(fromJson('["terraform","all"]'), inputs.scan_type)
        uses: bridgecrewio/checkov-action@v12.3112.0
        with:
          directory: ${{ inputs.working_directory }}
          framework: terraform
          soft_fail: "true"

      - name: npm audit
        if: contains(fromJson('["app","all"]'), inputs.scan_type)
        run: npm audit --audit-level=high

      - name: Trivy image scan
        if: contains(fromJson('["container","all"]'), inputs.scan_type) && inputs.image_ref != ''
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          exit-code: "1"
          severity: "CRITICAL,HIGH"
