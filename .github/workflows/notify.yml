name: Notify

on:
  workflow_call:
    inputs:
      status:
        description: "success or failure"
        type: string
        required: true
      environment:
        type: string
        default: ""
      message:
        description: "Overrides the default-composed message"
        type: string
        default: ""
    secrets:
      GOOGLE_CHAT_WEBHOOK_URL:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false

jobs:
  notify:
    name: notify
    runs-on: ubuntu-latest
    steps:
      - name: Compose message
        id: compose
        env:
          MESSAGE: ${{ inputs.message }}
        run: |
          TEXT="$MESSAGE"
          if [ -z "$TEXT" ]; then
            TEXT="${{ github.repository }} — ${{ inputs.environment }} — ${{ inputs.status }} (${{ github.sha }})"
          fi
          {
            echo "text<<NOTIFY_EOF"
            echo "$TEXT"
            echo "NOTIFY_EOF"
          } >> "$GITHUB_OUTPUT"

      # Unconditional at the step level, not `if: secrets.X != ''` — the
      # secrets context isn't permitted in step if: conditionals at all (a
      # hard workflow-parse error: the whole run fails at startup with zero
      # jobs created, for every job in the file, not just this one). The
      # "is this webhook configured" check has to live inside the shell
      # script instead — and unlike the git-config case elsewhere, curl
      # given an empty URL is a real failure, not a harmless no-op, so this
      # one needs an actual guard rather than just tolerating the empty value.
      - name: Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          TEXT: ${{ steps.compose.outputs.text }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "GOOGLE_CHAT_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
            -d "$(jq -n --arg t "$TEXT" '{text: $t}')" \
            "$WEBHOOK_URL"

      - name: Teams
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEXT: ${{ steps.compose.outputs.text }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
            -d "$(jq -n --arg t "$TEXT" '{text: $t}')" \
            "$WEBHOOK_URL"
