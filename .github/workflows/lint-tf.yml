name: Lint (Terraform)

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Terraform root to lint. Ignored if working_directories is set."
        type: string
        default: "."
      working_directories:
        description: "JSON array of Terraform roots to lint as a matrix, e.g. '[\"common/ecr\",\"common/acm\"]'"
        type: string
        default: ""
      terraform_version:
        description: "Terraform version to install"
        type: string
        default: "1.7.x"
    secrets:
      TF_MODULE_READ_PAT:
        description: "Read-only PAT for cloning private terraform-aws-* module repos. Only needed if the root being linted sources private modules — module repos themselves don't."
        required: false

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        working_directory: ${{ inputs.working_directories != '' && fromJson(inputs.working_directories) || fromJson(format('["{0}"]', inputs.working_directory)) }}
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: terraform fmt
        run: terraform fmt -check -recursive

      # GITHUB_TOKEN is scoped only to this repo — it can't clone sibling
      # private terraform-aws-* module repos, so module downloads below would
      # fail with "could not read Username" without this. No AWS credentials
      # anywhere in this job — -backend=false means init/validate never touch
      # state, so lint is otherwise safe to run on PRs from forks.
      #
      # Unconditional, not `if: secrets.TF_MODULE_READ_PAT != ''` — the
      # secrets context isn't permitted in step `if:` conditionals at all
      # (a hard workflow-parse error: the whole run fails at startup with
      # zero jobs created, not just this step). Harmless when the secret
      # isn't set: git config gets an empty-token URL rewrite that's simply
      # never exercised by a root with no private module sources.
      - name: Configure git for private module repos
        run: git config --global url."https://x-access-token:${{ secrets.TF_MODULE_READ_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: terraform init
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate -no-color

      - uses: terraform-linters/setup-tflint@v4

      - name: tflint
        run: |
          tflint --init
          tflint -f compact
