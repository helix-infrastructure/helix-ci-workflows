# Copy into tf-control/.github/workflows/ci.yml.
# tf-control is the only repo with Terraform backend state, so it's the only
# repo that plans, applies, tests the endpoint, notifies, and rolls back.
# lint-tf+security-tf are the only pre-merge required checks — plan-tf/apply-tf
# run post-merge, gated by the `environment:` field's required-reviewer rule,
# not by a PR check (making them pre-merge-required would be circular).
#
# plan-tf and apply-tf stay separate jobs with an artifact handoff between them
# — not collapsed into one job — specifically so the saved plan is reviewable
# and the Environment's required-reviewer gate sits between "here's what would
# change" and "make it happen". That's the whole point of never applying
# without a saved, reviewed plan file.
#
# environment: is set on the plan-tf/apply-tf calling jobs (not just inside
# plan-tf.yml/apply-tf.yml's own job) because GitHub only resolves an
# Environment's secrets and protection rules for a reusable-workflow call if
# the *calling* job itself declares that environment — see
# https://docs.github.com/actions/using-workflows/reusing-workflows#using-environments-with-reusable-workflows
#
# permissions: blocks on plan-tf/apply-tf/test-endpoint are required, not
# optional — those reusable workflows request id-token:write (AWS OIDC) and
# apply-tf also contents:write (the deployed-{environment} tag push) in their
# own job, but a reusable workflow can only receive permissions its caller
# already has. Omitting this isn't a runtime permission error, it's a hard
# schema validation failure that fails the entire file at startup with zero
# jobs created — this cost real time to track down, don't drop it when
# copying this template.
#
# Shown here for one scaffold (test/helix-status-test) as the worked example —
# repeat the plan-tf/apply-tf/test-endpoint/notify block per scaffold/
# environment that's wired up. Matrix it once enough scaffolds are onboarded
# that the repetition is worth collapsing.
#
# workflow_dispatch's target input lets you plan/apply on demand — e.g.
# redeploy an app with no code changes, or apply a common/ infra root that
# has no push-path trigger of its own — without needing a real .tf diff to
# push. The resolve job turns either trigger (a push, whose target is implied
# by the path filter above, or a manual dispatch with an explicit choice)
# into one working_directory/health_check_url pair that plan-tf/apply-tf/
# test-endpoint all key off — add a case per root to resolve's script as more
# get onboarded, same place either way.
#
# Terraform is inherently directory-scoped — each root (app or common/) has
# its own state file and its own .tf files, so `terraform apply` from one
# working_directory can only ever touch what's declared there. There is no
# "apply everything in the repo" operation to accidentally trigger; the
# target selection here is about which one root to run against, not a safety
# rail against a blast radius that couldn't happen anyway.
#
# common/ roots (ACM, ECR, ECS cluster, etc.) have no meaningful single
# health-check endpoint — resolve leaves health_check_url empty for those,
# and test-endpoint/notify skip accordingly rather than erroring on a curl
# to an empty URL.

name: CI

on:
  pull_request:
    paths: ["**/*.tf", "**/*.tfvars"]
  push:
    branches: [main]
    paths: ["tf-control-helix/aws-accounts/test/helix-status-test/**"]
  workflow_dispatch:
    inputs:
      target:
        description: "Root to plan/apply — an app (redeploy with no code changes) or a common/ infra root. Leave empty for a rollback-only dispatch (use rollback_environment below instead)."
        type: choice
        options:
          - ""
          - helix-status-test
          - common/acm
          - common/alerting
          - common/bastion
          - common/ecr
          - common/ecs-cluster
          - common/ecs-task
          - common/monitoring
        default: ""
      rollback_environment:
        description: "Environment to roll back (leave empty for a normal run)"
        type: choice
        options: [sandbox, dev, test, prod]
        required: false

jobs:
  lint-tf:
    if: github.event_name == 'pull_request'
    uses: helix-infrastructure/helix-ci-workflows/.github/workflows/lint-tf.yml@v1.0.0
    with:
      working_directory: tf-control-helix/aws-accounts/test/helix-status-test
    secrets:
      TF_MODULE_READ_PAT: ${{ secrets.TF_MODULE_READ_PAT }}

  security-tf:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write # gitleaks-action posts PR comments
    uses: helix-infrastructure/helix-ci-workflows/.github/workflows/security.yml@v1.0.0
    with:
      scan_type: terraform
      working_directory: tf-control-helix/aws-accounts/test/helix-status-test

  # Downstream jobs key off resolve's outputs, not their own if: — a job with
  # a skipped `needs:` dependency is skipped automatically, so this is the
  # only place the push-vs-dispatch-vs-neither condition needs to be written.
  resolve:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target != '')
    runs-on: ubuntu-latest
    outputs:
      working_directory: ${{ steps.set.outputs.working_directory }}
      health_check_url: ${{ steps.set.outputs.health_check_url }}
    steps:
      - id: set
        run: |
          TARGET="${{ inputs.target || 'helix-status-test' }}"
          echo "working_directory=tf-control-helix/aws-accounts/test/${TARGET}" >> "$GITHUB_OUTPUT"
          case "$TARGET" in
            helix-status-test) echo "health_check_url=https://internal.status.helix-infrastructure.co.uk" >> "$GITHUB_OUTPUT" ;;
            # common/* roots: no single health-check endpoint, leave empty —
            # test-endpoint and notify both skip when this output is unset.
          esac

  plan-tf:
    needs: resolve
    environment: test
    permissions:
      id-token: write
      contents: read
    uses: helix-infrastructure/helix-ci-workflows/.github/workflows/plan-tf.yml@v1.0.0
    with:
      working_directory: ${{ needs.resolve.outputs.working_directory }}
      environment: test
    secrets:
      AWS_STATE_ROLE_ARN: ${{ secrets.AWS_STATE_ROLE_ARN }}
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      TF_MODULE_READ_PAT: ${{ secrets.TF_MODULE_READ_PAT }}

  apply-tf:
    needs: [resolve, plan-tf]
    environment: test
    permissions:
      id-token: write
      contents: write
    uses: helix-infrastructure/helix-ci-workflows/.github/workflows/apply-tf.yml@v1.0.0
    with:
      working_directory: ${{ needs.resolve.outputs.working_directory }}
      environment: test
    secrets:
      AWS_STATE_ROLE_ARN: ${{ secrets.AWS_STATE_ROLE_ARN }}
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      TF_MODULE_READ_PAT: ${{ secrets.TF_MODULE_READ_PAT }}

  # Skips for common/ targets — no single meaningful health-check endpoint,
  # see resolve above.
  test-endpoint:
    if: needs.resolve.outputs.health_check_url != ''
    needs: [resolve, apply-tf]
    permissions:
      id-token: write
      contents: read
    uses: helix-infrastructure/helix-ci-workflows/.github/workflows/test-endpoint.yml@v1.0.0
    with:
      health_check_url: ${{ needs.resolve.outputs.health_check_url }}

  notify:
    # test-endpoint being skipped (a common/ target with no health check) is
    # not itself a failure — fall back to apply-tf's result in that case.
    # Written with explicit parens: GHA's && binds tighter than ||, same as
    # most languages, but this is exactly the kind of expression that's
    # cheap to get subtly wrong and expensive to debug in CI.
    if: always() && needs.resolve.result == 'success'
    needs: [resolve, apply-tf, test-endpoint]
    uses: helix-infrastructure/helix-ci-workflows/.github/workflows/notify.yml@v1.0.0
    with:
      status: ${{ ((needs.test-endpoint.result == 'skipped' && needs.apply-tf.result == 'success') || needs.test-endpoint.result == 'success') && 'success' || 'failure' }}
      environment: test
    secrets:
      GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

  rollback:
    if: github.event_name == 'workflow_dispatch' && inputs.rollback_environment != ''
    uses: helix-infrastructure/helix-ci-workflows/.github/workflows/rollback.yml@v1.0.0
    with:
      environment: ${{ inputs.rollback_environment }}
    secrets:
      HELIX_BOT_PAT: ${{ secrets.HELIX_BOT_PAT }}
